<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Tarefas</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      padding: 10px;
      width: 60%;
    }

    button {
      padding: 10px;
      cursor: pointer;
      margin-left: 5px;
    }

    ul {
      padding: 0;
    }

    li {
      list-style: none;
      margin: 10px 0;
      padding: 10px;
      background: #eee;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .concluida {
      text-decoration: line-through;
      color: gray;
    }

    .tarefa-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    li:hover {
      background: #ddd;
      transition: 0.2s;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Lista de Tarefas</h2>

    <input type="text" id="inputTarefa" placeholder="Digite uma tarefa">
    <button onclick="adicionarTarefa()">Adicionar</button>

    <ul id="lista"></ul>
  </div>

  <script>
    // Carrega do localStorage ou inicia vazio
    let tarefas = JSON.parse(localStorage.getItem('tarefas')) || [];

    function salvar() {
      localStorage.setItem('tarefas', JSON.stringify(tarefas));
    }

    function renderizarTarefas() {
      const lista = document.getElementById('lista');
      lista.innerHTML = '';

      tarefas.forEach((tarefa, index) => {
        const li = document.createElement('li');

        // Container da esquerda (checkbox + texto)
        const div = document.createElement('div');
        div.classList.add('tarefa-container');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = tarefa.status;

        checkbox.onchange = () => {
          tarefa.status = checkbox.checked;
          salvar();
          renderizarTarefas();
        };

        const span = document.createElement('span');
        span.textContent = tarefa.descricao;

        if (tarefa.status) {
          span.classList.add('concluida');
        }

        div.appendChild(checkbox);
        div.appendChild(span);

        // Botão excluir
        const btnExcluir = document.createElement('button');
        btnExcluir.textContent = 'Excluir';

        btnExcluir.onclick = () => {
          tarefas.splice(index, 1);
          salvar();
          renderizarTarefas();
        };

        li.appendChild(div);
        li.appendChild(btnExcluir);

        lista.appendChild(li);
      });
    }

    function adicionarTarefa() {
      const input = document.getElementById('inputTarefa');
      const texto = input.value.trim();

      if (!texto) return;

      tarefas.push({
        descricao: texto,
        status: false
      });

      salvar();
      renderizarTarefas();

      input.value = '';
    }

    // Renderiza ao abrir a página
    renderizarTarefas();
  </script>

</body>
</html>
