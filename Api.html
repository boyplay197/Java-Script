<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Busca de Usuários GitHub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 70%;
      padding: 10px;
      margin-right: 10px;
    }
    button {
      padding: 10px 15px;
      cursor: pointer;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background: #eee;
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
      display: flex;
      align-items: center;
    }
    img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      margin-right: 10px;
    }
    .error {
      color: red;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Buscar usuários do GitHub</h2>
    <input type="text" id="searchInput" placeholder="Digite o nome do usuário...">
    <button onclick="buscarUsuarios()">Buscar</button>

    <ul id="listaUsuarios"></ul>
    <p id="mensagem" class="error"></p>
  </div>

  <script>
    async function buscarUsuarios() {
      const query = document.getElementById('searchInput').value;
      const lista = document.getElementById('listaUsuarios');
      const mensagem = document.getElementById('mensagem');

      lista.innerHTML = '';
      mensagem.textContent = '';

      if (!query) {
        mensagem.textContent = 'Digite algo para pesquisar.';
        return;
      }

      try {
        const response = await fetch(`https://api.github.com/search/users?q=${query}`);
        const data = await response.json();

        if (data.items.length === 0) {
          mensagem.textContent = 'Não foram encontrados usuários para esta pesquisa';
          return;
        }

        data.items.forEach(user => {
          const li = document.createElement('li');

          li.innerHTML = `
            <img src="${user.avatar_url}" alt="${user.login}">
            <div>
              <strong>${user.login}</strong><br>
              <a href="${user.html_url}" target="_blank">Ver perfil</a>
            </div>
          `;

          lista.appendChild(li);
        });

      } catch (error) {
        mensagem.textContent = 'Erro ao buscar usuários.';
      }
    }
  </script>
</body>
</html>
