<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Curtidas</title>
</head>
<body>

    <h2>Deixe seu like 👍</h2>

    <input type="text" id="nome" placeholder="Digite seu nome">
    <button onclick="curtir()">Curtir</button>
    <button onclick="limpar()">Limpar</button>

    <p id="resultado">Ninguém curtiu</p>

    <script>
        // 🔥 Agora carrega do localStorage
        let pessoas = JSON.parse(localStorage.getItem("pessoas")) || [];

        function curtir() {
            const input = document.getElementById("nome");
            const nome = input.value.trim();

            if (nome === "") return;

            // Verifica se já existe
            if (!pessoas.includes(nome)) {
                pessoas.push(nome);

                // 💾 Salva no localStorage
                localStorage.setItem("pessoas", JSON.stringify(pessoas));
            }

            atualizarTexto();
            input.value = "";
        }

        function atualizarTexto() {
            const p = document.getElementById("resultado");

            if (pessoas.length === 0) {
                p.textContent = "Ninguém curtiu";
            } else if (pessoas.length === 1) {
                p.textContent = `${pessoas[0]} curtiu`;
            } else if (pessoas.length === 2) {
                p.textContent = `${pessoas[0]} e ${pessoas[1]} curtiram`;
            } else {
                p.textContent = `${pessoas[0]}, ${pessoas[1]} e mais ${pessoas.length - 2} pessoas curtiram`;
            }
        }

        // 🧹 Função limpar
        function limpar() {
            pessoas = [];
            localStorage.removeItem("pessoas");
            atualizarTexto();
        }

        // 🔄 Atualiza ao carregar a página
        atualizarTexto();
    </script>

</body>
</html>
